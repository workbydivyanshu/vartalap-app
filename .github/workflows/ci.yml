name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run unit tests
        working-directory: client
        run: npm test

      - name: Build client
        working-directory: client
        run: npm run build

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [test, build-server]
    steps:
      - uses: actions/checkout@v4

      - name: Build client image
        run: docker build -t vartalap-client ./client

      - name: Build server image
        run: docker build -t vartalap-server ./server
