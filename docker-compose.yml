version: "3.8"
services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - vartalap-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vartalap

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/vartalap
      - JWT_SECRET=vartalap-secret-change-in-production
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  vartalap-data:
